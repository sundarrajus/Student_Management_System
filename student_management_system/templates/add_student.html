<!DOCTYPE html>
<html>
<head>

<title>Add Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.form-card{
max-width:600px;
margin:auto;
margin-top:60px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>


<div class="container">

<div class="card form-card p-4">

<h2 class="text-center mb-4">Add Student</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Age</label>
<input type="number" name="age" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Place</label>
<input type="text" name="place" class="form-control">
</div>


<!-- Gender -->

<div class="mb-3">

<label class="form-label">Gender</label>

<div>

<input type="radio" name="gender" value="Male"> Male

<input type="radio" name="gender" value="Female" class="ms-3"> Female

<input type="radio" name="gender" value="Other" class="ms-3"> Other

</div>

</div>


<!-- Skillset -->

<div class="mb-3">

<label class="form-label">Skillset</label>

<div>

<input type="checkbox" name="skillset" value="Python"> Python

<input type="checkbox" name="skillset" value="Django" class="ms-2"> Django

<input type="checkbox" name="skillset" value="HTML" class="ms-2"> HTML

<input type="checkbox" name="skillset" value="CSS" class="ms-2"> CSS

<input type="checkbox" name="skillset" value="JavaScript" class="ms-2"> JavaScript

<input type="checkbox" name="skillset" value="SQL" class="ms-2"> SQL

</div>

</div>


<!-- State -->

<div class="mb-4">

<label class="form-label">State</label>

<select name="state" class="form-select">

<option>Andhra Pradesh</option>

<option>Telangana</option>

<option>Karnataka</option>

<option>Tamil Nadu</option>

</select>

</div>


<div class="text-center">

<button type="submit" class="btn btn-primary px-4">
Add Student
</button>

<a href="{% url 'dashboard' %}" class="btn btn-secondary px-4">
Go Back
</a>

</div>

</form>

</div>

</div>

</body>

</html>
